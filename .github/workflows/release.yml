name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install SWC and runtime deps
      run: |
        # Kill the monorepo workspace config and lockfile
        rm -f package.json package-lock.json
        npm init -y --silent
        npm install @swc/cli @swc/core
        # Install per-package deps without monorepo interference
        cd packages/shared && rm -f package-lock.json && npm install --ignore-scripts 2>/dev/null || true
        cd ../core && rm -f package-lock.json && npm install --ignore-scripts 2>/dev/null || true

    - name: Build shared
      run: npx swc packages/shared/src -d packages/shared/build --strip-leading-paths -C module.type=es6 -C jsc.target=es2020 -C jsc.parser.syntax=typescript

    - name: Build core
      run: |
        npx swc packages/core/src -d packages/core/build --strip-leading-paths -C module.type=es6 -C jsc.target=es2020 -C jsc.parser.syntax=typescript
        find packages/core/build -name '*.js' -exec sed -i 's/\.ts"/\.js"/g' {} +
        find packages/core/build -name '*.js' -exec sed -i "s/\.ts'/\.js'/g" {} +

    - name: Package
      run: |
        mkdir -p release
        cp -r packages/core/build release/
        cp packages/core/package.json release/
        tar czf clickup-mcp-server-${{ github.ref_name }}.tar.gz -C release .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: clickup-mcp-server-${{ github.ref_name }}.tar.gz
        generate_release_notes: true
        body: |
          ## Installation

          ```bash
          # Télécharger et extraire
          mkdir clickup-mcp && cd clickup-mcp
          tar xzf clickup-mcp-server-${{ github.ref_name }}.tar.gz
          npm install --omit=dev

          # Ajouter à Claude Code
          claude mcp add --scope user clickup \
            -e CLICKUP_API_TOKEN=VOTRE_TOKEN \
            -- node build/index-enhanced.js
          ```
