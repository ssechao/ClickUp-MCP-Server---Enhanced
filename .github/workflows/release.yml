name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: |
        # Remove prepare script and exclude broken intelligence package
        node -e "
          const p=require('./package.json');
          delete p.scripts.prepare;
          p.workspaces = ['packages/shared', 'packages/core'];
          require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2));
        "
        npm install

    - name: Install SWC
      run: npm install -D @swc/cli @swc/core

    - name: Build shared package
      run: |
        cd packages/shared
        npx swc src -d build --strip-leading-paths \
          -C module.type=es6 -C jsc.target=es2020 \
          -C jsc.parser.syntax=typescript -C jsc.parser.decorators=true
        # Generate declaration files with tsc (emit only .d.ts)
        npx tsc --emitDeclarationOnly --declaration --outDir build 2>/dev/null || true

    - name: Build core package
      run: |
        cd packages/core
        npx swc src -d build --strip-leading-paths \
          -C module.type=es6 -C jsc.target=es2020 \
          -C jsc.parser.syntax=typescript -C jsc.parser.decorators=true
        # Fix .ts extensions in imports to .js
        find build -name '*.js' -exec sed -i 's/\.ts"/\.js"/g; s/\.ts'\''/\.js'\''/g' {} +

    - name: Package build artifacts
      run: |
        cd packages/core
        tar czf ../../clickup-mcp-server-${{ github.ref_name }}.tar.gz build/ package.json
        cd ../..

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: clickup-mcp-server-${{ github.ref_name }}.tar.gz
        generate_release_notes: true
        body: |
          ## Installation

          ```bash
          # Télécharger et extraire
          tar xzf clickup-mcp-server-${{ github.ref_name }}.tar.gz

          # Installer les dépendances runtime
          npm install --omit=dev

          # Ajouter à Claude Code
          claude mcp add --scope user clickup \
            -e CLICKUP_API_TOKEN=VOTRE_TOKEN \
            -- node /chemin/vers/build/index-enhanced.js
          ```
