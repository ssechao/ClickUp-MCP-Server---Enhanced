name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install dependencies (no workspace hoisting)
      run: |
        cd packages/shared && npm install --ignore-scripts && cd ../..
        cd packages/core && npm install --ignore-scripts && cd ../..
        npm install --ignore-scripts @swc/cli @swc/core

    - name: Build shared package
      run: |
        cd packages/shared
        npx swc src -d build --strip-leading-paths \
          -C module.type=es6 -C jsc.target=es2020 \
          -C jsc.parser.syntax=typescript

    - name: Build core package
      run: |
        cd packages/core
        npx swc src -d build --strip-leading-paths \
          -C module.type=es6 -C jsc.target=es2020 \
          -C jsc.parser.syntax=typescript
        # Fix .ts extensions in imports to .js
        find build -name '*.js' -exec sed -i 's/\.ts"/\.js"/g' {} +
        find build -name '*.js' -exec sed -i "s/\.ts'/\.js'/g" {} +

    - name: Package build artifacts
      run: |
        mkdir -p dist
        cp -r packages/core/build dist/
        cp packages/core/package.json dist/
        cp -r packages/shared/build dist/shared-build
        cd dist && tar czf ../clickup-mcp-server-${{ github.ref_name }}.tar.gz .

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: clickup-mcp-server-${{ github.ref_name }}.tar.gz
        generate_release_notes: true
        body: |
          ## Installation

          ```bash
          # Télécharger et extraire
          tar xzf clickup-mcp-server-${{ github.ref_name }}.tar.gz

          # Installer les dépendances runtime
          npm install --omit=dev

          # Ajouter à Claude Code
          claude mcp add --scope user clickup \
            -e CLICKUP_API_TOKEN=VOTRE_TOKEN \
            -- node /chemin/vers/build/index-enhanced.js
          ```
